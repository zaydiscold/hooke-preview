services:
  - type: web
    name: hooke-preview
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PUBMED_EMAIL
        value: hooke-bio@users.noreply.github.com
